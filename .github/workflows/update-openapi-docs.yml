name: Update OpenAPI Documentation

on:
  workflow_dispatch: { }

permissions: { }

jobs:
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    if: "${{ github.repository_owner == 'DependencyTrack' }}"
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
    - name: Download OpenAPI Specs
      env:
        GH_TOKEN: "${{ github.token }}"
      run: |-
        gh run download --repo DependencyTrack/hyades-apiserver \
          --name openapi-spec \
          --dir /tmp/openapi-spec
    - name: Update Spec Files
      run: |-
        cp /tmp/openapi-spec/apiserver/target/classes/org/dependencytrack/api/v1/openapi.yaml \
          docs/reference/api/openapi-v1.yaml
        cp /tmp/openapi-spec/api/target/classes/org/dependencytrack/api/v2/openapi.yaml \
          docs/reference/api/openapi-v2.yaml
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # tag=v8.1.1
      with:
        add-paths: "docs/reference/api/openapi-*.yaml"
        branch: update-openapi-docs
        body: "Updates OpenAPI documentation."
        commit-message: Update OpenAPI docs
        delete-branch: true
        labels: documentation
        signoff: true
        title: Update OpenAPI docs
