  /v1/vex:
    post:
      description: |-
        <p>
          Expects CycloneDX and a valid project UUID. If a UUID is not specified,
          then the <code>projectName</code> and <code>projectVersion</code> must be specified.
        </p>
        <p>
          The VEX will be validated against the CycloneDX schema. If schema validation fails,
          a response with problem details in RFC 9457 format will be returned. In this case,
          the response's content type will be <code>application/problem+json</code>.
        </p>
        <p>Requires permission <strong>VULNERABILITY_ANALYSIS</strong> or <strong>VULNERABILITY_ANALYSIS_UPDATE</strong></p>
      operationId: uploadVex_1
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project:
                  type: string
                projectName:
                  type: string
                projectVersion:
                  type: string
                vex:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomUploadResponse"
          description: Token to be used for checking VEX processing progress
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/InvalidBomProblemDetails"
          description: Invalid VEX
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Upload a supported VEX document
      tags:
      - vex
    put:
      description: |-
        <p>
          Expects CycloneDX and a valid project UUID. If a UUID is not specified,
          then the <code>projectName</code> and <code>projectVersion</code> must be specified.
        </p>
        <p>
          The VEX will be validated against the CycloneDX schema. If schema validation fails,
          a response with problem details in RFC 9457 format will be returned. In this case,
          the response's content type will be <code>application/problem+json</code>.
        </p>
        <p>
          The maximum allowed length of the <code>vex</code> value is 20'000'000 characters.
          When uploading large VEX files, the <code>POST</code> endpoint is preferred,
          as it does not have this limit.
        </p>
        <p>Requires permission <strong>VULNERABILITY_ANALYSIS</strong> or <strong>VULNERABILITY_ANALYSIS_UPDATE</strong></p>
      operationId: uploadVex
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VexSubmitRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomUploadResponse"
          description: Token to be used for checking VEX processing progress
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/InvalidBomProblemDetails"
          description: Invalid VEX
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Upload a supported VEX document
      tags:
      - vex
  /v1/vex/cyclonedx/project/{uuid}:
    get:
      description: <p>Requires permission <strong>VULNERABILITY_ANALYSIS</strong>
        or <strong>VULNERABILITY_ANALYSIS_READ</strong></p>
      operationId: exportProjectAsCycloneDx_1
      parameters:
      - description: The UUID of the project to export
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
