components:
  schemas:
    About:
      type: object
      properties:
        application:
          type: string
        framework:
          $ref: "#/components/schemas/Framework"
        providerData:
          type: object
          additionalProperties:
            type: object
        systemUuid:
          type: string
        timestamp:
          type: string
        uuid:
          type: string
        version:
          type: string
    AclMappingRequest:
      type: object
      properties:
        project:
          type: string
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        team:
          type: string
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      required:
      - project
      - team
    AffectedComponent:
      type: object
      properties:
        affectedVersionAttributions:
          type: array
          items:
            $ref: "#/components/schemas/AffectedVersionAttribution"
        identity:
          type: string
        identityType:
          type: string
          enum:
          - CPE
          - PURL
        uuid:
          type: string
          format: uuid
        version:
          type: string
        versionEndExcluding:
          type: string
        versionEndIncluding:
          type: string
        versionStartExcluding:
          type: string
        versionStartIncluding:
          type: string
        versionType:
          type: string
          enum:
          - EXACT
          - RANGE
    AffectedProject:
      type: object
      properties:
        active:
          type: boolean
        affectedComponentUuids:
          type: array
          items:
            type: string
            format: uuid
        dependencyGraphAvailable:
          type: boolean
        name:
          type: string
        uuid:
          type: string
          format: uuid
        version:
          type: string
    AffectedVersionAttribution:
      type: object
      properties:
        firstSeen:
          type: integer
          format: int64
          description: UNIX epoch timestamp in milliseconds
        lastSeen:
          type: integer
          format: int64
          description: UNIX epoch timestamp in milliseconds
        source:
          type: string
          enum:
          - NVD
          - NPM
          - GITHUB
          - VULNDB
          - OSSINDEX
          - RETIREJS
          - INTERNAL
          - OSV
          - SNYK
        uuid:
          type: string
          format: uuid
      required:
      - firstSeen
      - lastSeen
    Analysis:
      type: object
      properties:
        analysisComments:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisComment"
        analysisDetails:
          type: string
        analysisJustification:
          type: string
          enum:
          - CODE_NOT_PRESENT
          - CODE_NOT_REACHABLE
          - REQUIRES_CONFIGURATION
          - REQUIRES_DEPENDENCY
          - REQUIRES_ENVIRONMENT
          - PROTECTED_BY_COMPILER
          - PROTECTED_AT_RUNTIME
          - PROTECTED_AT_PERIMETER
          - PROTECTED_BY_MITIGATING_CONTROL
          - NOT_SET
        analysisResponse:
          type: string
          enum:
          - CAN_NOT_FIX
          - WILL_NOT_FIX
          - UPDATE
          - ROLLBACK
          - WORKAROUND_AVAILABLE
          - NOT_SET
        analysisState:
          type: string
          enum:
          - EXPLOITABLE
          - IN_TRIAGE
          - FALSE_POSITIVE
          - NOT_AFFECTED
          - RESOLVED
          - NOT_SET
        cvssV2Score:
          type: number
        cvssV2Vector:
          type: string
        cvssV3Score:
          type: number
        cvssV3Vector:
          type: string
        cvssV4Score:
          type: number
        cvssV4Vector:
          type: string
        isSuppressed:
          type: boolean
        owaspScore:
          type: number
        owaspVector:
          type: string
        severity:
          type: string
          enum:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          - INFO
          - UNASSIGNED
      required:
      - analysisDetails
      - analysisJustification
      - analysisResponse
      - analysisState
    AnalysisComment:
      type: object
      properties:
        comment:
          type: string
        commenter:
          type: string
        timestamp:
          type: integer
          format: int64
          description: UNIX epoch timestamp in milliseconds
      required:
      - comment
      - timestamp
    AnalysisRequest:
      type: object
      properties:
        analysisDetails:
          type: string
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\n\\r\\t]*$"
        analysisJustification:
          type: string
          enum:
          - CODE_NOT_PRESENT
          - CODE_NOT_REACHABLE
          - REQUIRES_CONFIGURATION
          - REQUIRES_DEPENDENCY
          - REQUIRES_ENVIRONMENT
          - PROTECTED_BY_COMPILER
          - PROTECTED_AT_RUNTIME
          - PROTECTED_AT_PERIMETER
          - PROTECTED_BY_MITIGATING_CONTROL
          - NOT_SET
        analysisResponse:
          type: string
          enum:
          - CAN_NOT_FIX
          - WILL_NOT_FIX
          - UPDATE
          - ROLLBACK
          - WORKAROUND_AVAILABLE
          - NOT_SET
        analysisState:
          type: string
          enum:
          - EXPLOITABLE
          - IN_TRIAGE
          - FALSE_POSITIVE
          - NOT_AFFECTED
          - RESOLVED
          - NOT_SET
        comment:
          type: string
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\n\\r\\t]*$"
        component:
          type: string
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        isSuppressed:
          type: boolean
          writeOnly: true
        project:
          type: string
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        suppressed:
          type: boolean
        vulnerability:
          type: string
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      required:
      - component
      - vulnerability
    ApiKey:
      type: object
      properties:
        comment:
          type: string
          maxLength: 255
          minLength: 0
        created:
          type: string
          format: date-time
        key:
          type: string
        lastUsed:
          type: string
          format: date-time
        legacy:
          type: boolean
        maskedKey:
          type: string
        publicId:
          type: string
          maxLength: 8
          minLength: 5
    BomSubmitRequest:
      type: object
      properties:
        autoCreate:
          type: boolean
        bom:
          type: string
          description: Base64 encoded BOM
          example: ewogICJib21Gb3JtYXQiOiAiQ3ljbG9uZURYIiwKICAic3BlY1ZlcnNpb24iOiAiMS40IiwKICAiY29tcG9uZW50cyI6IFsKICAgIHsKICAgICAgInR5cGUiOiAibGlicmFyeSIsCiAgICAgICJuYW1lIjogImFjbWUtbGliIiwKICAgICAgInZlcnNpb24iOiAiMS4wLjAiCiAgICB9CiAgXQp9
          pattern: "^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$"
        isLatest:
          type: boolean
        parentName:
          type: string
          example: Example Application Parent
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]*$"
        parentUUID:
          type: string
          example: 5341f53c-611b-4388-9d9c-731026dc5eec
