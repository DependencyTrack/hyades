openapi: 3.0.1
info:
  contact:
    name: The Dependency-Track Authors
    url: https://github.com/DependencyTrack/dependency-track
  description: REST API of OWASP Dependency-Track
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: OWASP Dependency-Track
  version: 5.7.0-alpha.4-SNAPSHOT
servers:
- url: /api
paths:
  /v1/acl/mapping:
    put:
      description: <p>Requires permission <strong>ACCESS_MANAGEMENT</strong></p>
      operationId: addMapping
      requestBody:
        content:
          '*/*':
            schema:
              $ref: "#/components/schemas/AclMappingRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AclMappingRequest"
          description: Mapping created successfully
        "401":
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Team or project could not be found
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: A mapping with the same team and project already exists
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Adds an ACL mapping
      tags:
      - acl
  /v1/acl/mapping/team/{teamUuid}/project/{projectUuid}:
    delete:
      description: <p>Requires permission <strong>ACCESS_MANAGEMENT</strong> or <strong>ACCESS_MANAGEMENT_DELETE</strong></p>
      operationId: deleteMapping
      parameters:
      - description: The UUID of the team to delete the mapping for
        in: path
        name: teamUuid
        required: true
        schema:
          type: string
          format: uuid
      - description: The UUID of the project to delete the mapping for
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Mapping removed successfully
        "401":
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Team or project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Removes an ACL mapping
      tags:
      - acl
  /v1/acl/team/{uuid}:
    get:
      description: <p>Requires permission <strong>ACCESS_MANAGEMENT</strong> or <strong>ACCESS_MANAGEMENT_READ</strong></p>
      operationId: retrieveProjects
      parameters:
      - description: The page to return. To be used in conjunction with <code>pageSize</code>.
        in: query
        name: pageNumber
        schema:
          type: string
          default: "1"
      - description: Number of elements to return per page. To be used in conjunction
          with <code>pageNumber</code>.
        in: query
        name: pageSize
        schema:
          type: string
          default: "100"
      - description: Offset to start returning elements from. To be used in conjunction
          with <code>limit</code>.
        in: query
        name: offset
        schema:
          type: string
      - description: Number of elements to return per page. To be used in conjunction
          with <code>offset</code>.
        in: query
        name: limit
        schema:
          type: string
      - description: Name of the resource field to sort on.
        in: query
        name: sortName
        schema:
          type: string
      - description: Ordering of items when sorting with <code>sortName</code>.
        in: query
        name: sortOrder
        schema:
          type: string
          enum:
          - "asc, desc"
      - description: The UUID of the team to retrieve mappings for
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
      - description: Optionally excludes inactive projects from being returned
        in: query
        name: excludeInactive
        schema:
          type: boolean
      - description: Optionally excludes children projects from being returned
        in: query
        name: onlyRoot
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
          description: Projects assigned to the specified team
          headers:
            X-Total-Count:
              description: The total number of projects
              schema:
                format: integer
              style: simple
        "401":
          description: Unauthorized
        "404":
          description: The UUID of the team could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Returns the projects assigned to the specified team
      tags:
      - acl
  /v1/analysis:
    get:
      description: <p>Requires permission <strong>VIEW_VULNERABILITY</strong></p>
      operationId: retrieveAnalysis
      parameters:
      - description: The UUID of the project
        in: query
        name: project
        schema:
          type: string
          format: uuid
      - description: The UUID of the component
        in: query
        name: component
        required: true
        schema:
          type: string
          format: uuid
      - description: The UUID of the vulnerability
        in: query
        name: vulnerability
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
          description: An analysis trail
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: "The project, component, or vulnerability could not be found"
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Retrieves an analysis trail
      tags:
      - analysis
    put:
      description: <p>Requires permission <strong>VULNERABILITY_ANALYSIS</strong></strong>
        or <strong>VULNERABILITY_ANALYSIS_UPDATE</strong></p>
      operationId: updateAnalysis
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
          description: The created analysis
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: "The project, component, or vulnerability could not be found"
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Records an analysis decision
      tags:
      - analysis
  /v1/badge/violations/project/{name}/{version}:
    get:
      operationId: getProjectPolicyViolationsBadge_1
      parameters:
      - description: The name of the project to query on
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: The version of the project to query on
        in: path
        name: version
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            image/svg+xml:
              schema:
                type: string
          description: A badge displaying current policy violation metrics of a project
            in SVG format
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
      summary: Returns a policy violations badge for a specific project
      tags:
      - badge
  /v1/badge/violations/project/{uuid}:
    get:
      operationId: getProjectPolicyViolationsBadge
      parameters:
      - description: The UUID of the project to retrieve a badge for
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            image/svg+xml:
              schema:
                type: string
          description: A badge displaying current policy violation metrics of a project
            in SVG format
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
      summary: Returns a policy violations badge for a specific project
      tags:
      - badge
  /v1/badge/vulns/project/{name}/{version}:
    get:
      operationId: getProjectVulnerabilitiesBadge_1
      parameters:
      - description: The name of the project to query on
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: The version of the project to query on
        in: path
        name: version
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            image/svg+xml:
              schema:
                type: string
          description: A badge displaying current vulnerability metrics for a project
            in SVG format
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
      summary: Returns current metrics for a specific project
      tags:
      - badge
  /v1/badge/vulns/project/{uuid}:
    get:
      operationId: getProjectVulnerabilitiesBadge
      parameters:
      - description: The UUID of the project to retrieve metrics for
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            image/svg+xml:
              schema:
                type: string
          description: A badge displaying current vulnerability metrics for a project
            in SVG format
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
      summary: Returns current metrics for a specific project
      tags:
      - badge
  /v1/bom:
    post:
      description: |-
        <p>
          Expects CycloneDX and a valid project UUID. If a UUID is not specified,
          then the <code>projectName</code> and <code>projectVersion</code> must be specified.
          Optionally, if <code>autoCreate</code> is specified and <code>true</code> and the project does not exist,
          the project will be created. In this scenario, the principal making the request will
          additionally need the <strong>PORTFOLIO_MANAGEMENT</strong>, <strong>PORTFOLIO_MANAGEMENT_CREATE</strong>,
          or <strong>PROJECT_CREATION_UPLOAD</strong> permission.
        </p>
        <p>
          MediaType supported for BOM artifact is 'application/xml', 'application/json' or 'application/x.vnd.cyclonedx+protobuf'.
          The BOM will be validated against the CycloneDX schema. If schema validation fails,
          a response with problem details in RFC 9457 format will be returned. In this case,
          the response's content type will be <code>application/problem+json</code>.
        </p>
        <p>Requires permission <strong>BOM_UPLOAD</strong></p>
      operationId: UploadBom
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                autoCreate:
                  type: boolean
                  default: false
                bom:
                  type: string
                isLatest:
                  type: boolean
                  default: false
                parentName:
                  type: string
                parentUUID:
                  type: string
                parentVersion:
                  type: string
                project:
                  type: string
                projectName:
                  type: string
                projectTags:
                  type: string
                projectVersion:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomUploadResponse"
          description: Token to be used for checking BOM processing progress
        "400":
          description: The uploaded BOM is invalid
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Upload a supported bill of material format document
      tags:
      - bom
    put:
      description: |-
        <p>
          Expects CycloneDX and a valid project UUID. If a UUID is not specified,
          then the <code>projectName</code> and <code>projectVersion</code> must be specified.
          Optionally, if <code>autoCreate</code> is specified and <code>true</code> and the project does not exist,
          the project will be created. In this scenario, the principal making the request will
          additionally need the <strong>PORTFOLIO_MANAGEMENT</strong>, <strong>PORTFOLIO_MANAGEMENT_CREATE</strong>,
          or <strong>PROJECT_CREATION_UPLOAD</strong> permission.
        </p>
        <p>
          The BOM will be validated against the CycloneDX schema. If schema validation fails,
          a response with problem details in RFC 9457 format will be returned. In this case,
          the response's content type will be <code>application/problem+json</code>.
        </p>
        <p>
          The maximum allowed length of the <code>bom</code> value is 20'000'000 characters.
          When uploading large BOMs, the <code>POST</code> endpoint is preferred,
          as it does not have this limit.
        </p>
        <p>Requires permission <strong>BOM_UPLOAD</strong></p>
      operationId: UploadBomBase64Encoded
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BomSubmitRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomUploadResponse"
          description: Token to be used for checking BOM processing progress
        "400":
          description: The uploaded BOM is invalid
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Upload a supported bill of material format document
      tags:
      - bom
  /v1/bom/cyclonedx/component/{uuid}:
    get:
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
      operationId: exportComponentAsCycloneDx
      parameters:
      - description: The UUID of the component to export
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
      - description: The format to output (defaults to JSON)
        in: query
        name: format
        schema:
          type: string
      - description: "The CycloneDX Spec variant exported (defaults to: '1.5')"
        in: query
        name: version
        schema:
          type: string
      responses:
        "200":
          content:
            application/vnd.cyclonedx+json:
              schema:
                type: string
            application/vnd.cyclonedx+xml:
              schema:
                type: string
          description: Dependency metadata for a specific component in CycloneDX format
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The component could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Returns dependency metadata for a specific component in CycloneDX format
      tags:
      - bom
  /v1/bom/cyclonedx/project/{uuid}:
    get:
      description: |
        <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
        <p>
          The <code>withVulnerabilities</code> and <code>vdr</code> variants
          further require any of the following permissions:
          <ul>
            <li><strong>VIEW_VULNERABILITY</strong></li>
            <li><strong>VULNERABILITY_ANALYSIS</strong></li>
            <li><strong>VULNERABILITY_ANALYSIS_READ</strong></li>
          </ul>
        </p>
      operationId: exportProjectAsCycloneDx
      parameters:
      - description: The UUID of the project to export
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
      - description: The format to output (defaults to JSON)
        in: query
        name: format
        schema:
          type: string
      - description: Specifies the CycloneDX variant to export. Value options are
          'inventory' and 'withVulnerabilities'. (defaults to 'inventory')
        in: query
        name: variant
        schema:
          type: string
      - description: Force the resulting BOM to be downloaded as a file (defaults
          to 'false')
        in: query
        name: download
        schema:
          type: boolean
      - description: "The CycloneDX Spec variant exported (defaults to: '1.5')"
        in: query
        name: version
        schema:
          type: string
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                type: string
            application/vnd.cyclonedx+json:
              schema:
                type: string
            application/vnd.cyclonedx+xml:
              schema:
                type: string
          description: Dependency metadata for a project in CycloneDX format
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Returns dependency metadata for a project in CycloneDX format
      tags:
      - bom
  /v1/bom/token/{uuid}:
    get:
      deprecated: true
      description: |-
        <p>
          This endpoint is intended to be used in conjunction with uploading a supported BOM document.
          Upon upload, a token will be returned. The token can then be queried using this endpoint to
          determine if any tasks (such as vulnerability analysis) is being performed on the BOM:
          <ul>
            <li>A value of <code>true</code> indicates processing is occurring.</li>
            <li>A value of <code>false</code> indicates that no processing is occurring for the specified token.</li>
          </ul>
          However, a value of <code>false</code> also does not confirm the token is valid,
          only that no processing is associated with the specified token.
        </p>
        <p>Requires permission <strong>BOM_UPLOAD</strong></p>
        <p><strong>Deprecated</strong>. Use <code>/v1/event/token/{uuid}</code> instead.</p>
      operationId: isTokenBeingProcessed
      parameters:
      - description: The UUID of the token to query
        in: path
        name: uuid
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IsTokenBeingProcessedResponse"
          description: The processing status of the provided token
        "401":
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: "Determines if there are any tasks associated with the token that are\
        \ being processed, or in the queue to be processed."
      tags:
      - bom
  /v1/calculator/cvss:
    get:
      operationId: getCvssScores
      parameters:
      - description: A valid CVSSv2 or CVSSv3 vector
        in: query
        name: vector
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"
          description: The calculated scores
        "401":
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: "Returns the CVSS base score, impact sub-score and exploitability sub-score"
      tags:
      - calculator
  /v1/calculator/owasp:
    get:
      operationId: getOwaspRRScores
      parameters:
      - description: A valid OWASP Risk Rating vector
        in: query
        name: vector
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"
          description: The calculated scores
        "401":
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: "Returns the OWASP Risk Rating likelihood score, technical impact score\
        \ and business impact score"
      tags:
      - calculator
  /v1/component:
    post:
      description: <p>Requires permission <strong>PORTFOLIO_MANAGEMENT</strong> or
        <strong>PORTFOLIO_MANAGEMENT_UPDATE</strong></p>
      operationId: updateComponent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Component"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Component"
          description: The updated component
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
        "404":
          description: The UUID of the component could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Updates a component
      tags:
      - component
  /v1/component/hash/{hash}:
    get:
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
      operationId: getComponentByHash
      parameters:
      - description: The page to return. To be used in conjunction with <code>pageSize</code>.
        in: query
        name: pageNumber
        schema:
          type: string
          default: "1"
      - description: Number of elements to return per page. To be used in conjunction
          with <code>pageNumber</code>.
        in: query
        name: pageSize
        schema:
          type: string
          default: "100"
      - description: Offset to start returning elements from. To be used in conjunction
          with <code>limit</code>.
        in: query
        name: offset
        schema:
          type: string
      - description: Number of elements to return per page. To be used in conjunction
          with <code>offset</code>.
        in: query
        name: limit
        schema:
          type: string
      - description: Name of the resource field to sort on.
        in: query
        name: sortName
        schema:
          type: string
      - description: Ordering of items when sorting with <code>sortName</code>.
        in: query
        name: sortOrder
        schema:
          type: string
          enum:
          - "asc, desc"
      - description: "The MD5, SHA-1, SHA-256, SHA-384, SHA-512, SHA3-256, SHA3-384,\
          \ SHA3-512, BLAKE2b-256, BLAKE2b-384, BLAKE2b-512, or BLAKE3 hash of the\
          \ component to retrieve"
        in: path
        name: hash
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Component"
          description: A list of components that have the specified hash value
          headers:
            X-Total-Count:
              description: The total number of components
              schema:
                format: integer
              style: simple
        "401":
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Returns a list of components that have the specified hash value
      tags:
      - component
  /v1/component/identity:
    get:
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
      operationId: getComponentByIdentity
      parameters:
      - description: The page to return. To be used in conjunction with <code>pageSize</code>.
        in: query
        name: pageNumber
        schema:
          type: string
          default: "1"
      - description: Number of elements to return per page. To be used in conjunction
          with <code>pageNumber</code>.
        in: query
        name: pageSize
        schema:
          type: string
          default: "100"
      - description: Offset to start returning elements from. To be used in conjunction
          with <code>limit</code>.
        in: query
        name: offset
        schema:
          type: string
      - description: Number of elements to return per page. To be used in conjunction
          with <code>offset</code>.
        in: query
        name: limit
        schema:
          type: string
      - description: Name of the resource field to sort on.
        in: query
        name: sortName
        schema:
          type: string
      - description: Ordering of items when sorting with <code>sortName</code>.
        in: query
        name: sortOrder
        schema:
          type: string
          enum:
          - "asc, desc"
      - description: The group of the component
        in: query
        name: group
        schema:
          type: string
      - description: The name of the component
        in: query
        name: name
        schema:
          type: string
      - description: The version of the component
        in: query
        name: version
        schema:
          type: string
      - description: The purl of the component
        in: query
        name: purl
        schema:
          type: string
      - description: The cpe of the component
        in: query
        name: cpe
        schema:
          type: string
      - description: The swidTagId of the component
        in: query
        name: swidTagId
        schema:
          type: string
      - description: The project the component belongs to
        in: query
        name: project
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Component"
          description: A list of components that have the specified component identity
          headers:
            X-Total-Count:
              description: The total number of components
              schema:
                format: integer
              style: simple
        "401":
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          description: Access to the requested project is forbidden
      security:
      - ApiKeyAuth: []
