openapi: 3.0.1
info:
  title: OWASP Dependency-Track
  description: REST API of OWASP Dependency-Track
  contact:
    name: The Dependency-Track Authors
    url: https://github.com/DependencyTrack/dependency-track
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 5.7.0-alpha.3-SNAPSHOT
servers:
- url: /api
paths:
  /version:
    get:
      tags:
      - version
      summary: Returns application version information
      description: Returns a simple json object containing the name of the application
        and the version
      operationId: getVersion
      responses:
        "200":
          description: Application version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/About"
  /v1/acl/mapping:
    put:
      tags:
      - acl
      summary: Adds an ACL mapping
      description: <p>Requires permission <strong>ACCESS_MANAGEMENT</strong></p>
      operationId: addMapping
      requestBody:
        content:
          '*/*':
            schema:
              $ref: "#/components/schemas/AclMappingRequest"
      responses:
        "200":
          description: Mapping created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AclMappingRequest"
        "401":
          description: Unauthorized
        "404":
          description: Team or project could not be found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: A mapping with the same team and project already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/acl/mapping/team/{teamUuid}/project/{projectUuid}:
    delete:
      tags:
      - acl
      summary: Removes an ACL mapping
      description: <p>Requires permission <strong>ACCESS_MANAGEMENT</strong> or <strong>ACCESS_MANAGEMENT_DELETE</strong></p>
      operationId: deleteMapping
      parameters:
      - name: teamUuid
        in: path
        description: The UUID of the team to delete the mapping for
        required: true
        schema:
          type: string
          format: uuid
      - name: projectUuid
        in: path
        description: The UUID of the project to delete the mapping for
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Mapping removed successfully
        "401":
          description: Unauthorized
        "404":
          description: Team or project could not be found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/acl/team/{uuid}:
    get:
      tags:
      - acl
      summary: Returns the projects assigned to the specified team
      description: <p>Requires permission <strong>ACCESS_MANAGEMENT</strong> or <strong>ACCESS_MANAGEMENT_READ</strong></p>
      operationId: retrieveProjects
      parameters:
      - name: pageNumber
        in: query
        description: The page to return. To be used in conjunction with <code>pageSize</code>.
        schema:
          type: string
          default: "1"
      - name: pageSize
        in: query
        description: Number of elements to return per page. To be used in conjunction
          with <code>pageNumber</code>.
        schema:
          type: string
          default: "100"
      - name: offset
        in: query
        description: Offset to start returning elements from. To be used in conjunction
          with <code>limit</code>.
        schema:
          type: string
      - name: limit
        in: query
        description: Number of elements to return per page. To be used in conjunction
          with <code>offset</code>.
        schema:
          type: string
      - name: sortName
        in: query
        description: Name of the resource field to sort on.
        schema:
          type: string
      - name: sortOrder
        in: query
        description: Ordering of items when sorting with <code>sortName</code>.
        schema:
          type: string
          enum:
          - "asc, desc"
      - name: uuid
        in: path
        description: The UUID of the team to retrieve mappings for
        required: true
        schema:
          type: string
          format: uuid
      - name: excludeInactive
        in: query
        description: Optionally excludes inactive projects from being returned
        schema:
          type: boolean
      - name: onlyRoot
        in: query
        description: Optionally excludes children projects from being returned
        schema:
          type: boolean
      responses:
        "200":
          description: Projects assigned to the specified team
          headers:
            X-Total-Count:
              description: The total number of projects
              style: simple
              schema:
                format: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
        "404":
          description: The UUID of the team could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/analysis:
    get:
      tags:
      - analysis
      summary: Retrieves an analysis trail
      description: <p>Requires permission <strong>VIEW_VULNERABILITY</strong></p>
      operationId: retrieveAnalysis
      parameters:
      - name: project
        in: query
        description: The UUID of the project
        schema:
          type: string
          format: uuid
      - name: component
        in: query
        description: The UUID of the component
        required: true
        schema:
          type: string
          format: uuid
      - name: vulnerability
        in: query
        description: The UUID of the vulnerability
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: An analysis trail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: "The project, component, or vulnerability could not be found"
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
    put:
      tags:
      - analysis
      summary: Records an analysis decision
      description: <p>Requires permission <strong>VULNERABILITY_ANALYSIS</strong></strong>
        or <strong>VULNERABILITY_ANALYSIS_UPDATE</strong></p>
      operationId: updateAnalysis
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: The created analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: "The project, component, or vulnerability could not be found"
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/badge/violations/project/{uuid}:
    get:
      tags:
      - badge
      summary: Returns a policy violations badge for a specific project
      operationId: getProjectPolicyViolationsBadge
      parameters:
      - name: uuid
        in: path
        description: The UUID of the project to retrieve a badge for
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: A badge displaying current policy violation metrics of a project
            in SVG format
          content:
            image/svg+xml:
              schema:
                type: string
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
  /v1/badge/violations/project/{name}/{version}:
    get:
      tags:
      - badge
      summary: Returns a policy violations badge for a specific project
      operationId: getProjectPolicyViolationsBadge_1
      parameters:
      - name: name
        in: path
        description: The name of the project to query on
        required: true
        schema:
          type: string
      - name: version
        in: path
        description: The version of the project to query on
        required: true
        schema:
          type: string
      responses:
        "200":
          description: A badge displaying current policy violation metrics of a project
            in SVG format
          content:
            image/svg+xml:
              schema:
                type: string
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
  /v1/badge/vulns/project/{uuid}:
    get:
      tags:
      - badge
      summary: Returns current metrics for a specific project
      operationId: getProjectVulnerabilitiesBadge
      parameters:
      - name: uuid
        in: path
        description: The UUID of the project to retrieve metrics for
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: A badge displaying current vulnerability metrics for a project
            in SVG format
          content:
            image/svg+xml:
              schema:
                type: string
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
  /v1/badge/vulns/project/{name}/{version}:
    get:
      tags:
      - badge
      summary: Returns current metrics for a specific project
      operationId: getProjectVulnerabilitiesBadge_1
      parameters:
      - name: name
        in: path
        description: The name of the project to query on
        required: true
        schema:
          type: string
      - name: version
        in: path
        description: The version of the project to query on
        required: true
        schema:
          type: string
      responses:
        "200":
          description: A badge displaying current vulnerability metrics for a project
            in SVG format
          content:
            image/svg+xml:
              schema:
                type: string
        "403":
          description: Badges are disabled
        "404":
          description: The project could not be found
  /v1/bom/cyclonedx/component/{uuid}:
    get:
      tags:
      - bom
      summary: Returns dependency metadata for a specific component in CycloneDX format
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
      operationId: exportComponentAsCycloneDx
      parameters:
      - name: uuid
        in: path
        description: The UUID of the component to export
        required: true
        schema:
          type: string
          format: uuid
      - name: format
        in: query
        description: The format to output (defaults to JSON)
        schema:
          type: string
      - name: version
        in: query
        description: "The CycloneDX Spec variant exported (defaults to: '1.5')"
        schema:
          type: string
      responses:
        "200":
          description: Dependency metadata for a specific component in CycloneDX format
          content:
            application/vnd.cyclonedx+xml:
              schema:
                type: string
            application/vnd.cyclonedx+json:
              schema:
                type: string
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The component could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/bom/cyclonedx/project/{uuid}:
    get:
      tags:
      - bom
      summary: Returns dependency metadata for a project in CycloneDX format
      description: |
        <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
        <p>
          The <code>withVulnerabilities</code> and <code>vdr</code> variants
          further require any of the following permissions:
          <ul>
            <li><strong>VIEW_VULNERABILITY</strong></li>
            <li><strong>VULNERABILITY_ANALYSIS</strong></li>
            <li><strong>VULNERABILITY_ANALYSIS_READ</strong></li>
          </ul>
        </p>
      operationId: exportProjectAsCycloneDx
      parameters:
      - name: uuid
        in: path
        description: The UUID of the project to export
        required: true
        schema:
          type: string
          format: uuid
      - name: format
        in: query
        description: The format to output (defaults to JSON)
        schema:
          type: string
      - name: variant
        in: query
        description: Specifies the CycloneDX variant to export. Value options are
          'inventory' and 'withVulnerabilities'. (defaults to 'inventory')
        schema:
          type: string
      - name: download
        in: query
        description: Force the resulting BOM to be downloaded as a file (defaults
          to 'false')
        schema:
          type: boolean
      - name: version
        in: query
        description: "The CycloneDX Spec variant exported (defaults to: '1.5')"
        schema:
          type: string
      responses:
        "200":
          description: Dependency metadata for a project in CycloneDX format
          content:
            application/vnd.cyclonedx+xml:
              schema:
                type: string
            application/vnd.cyclonedx+json:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/bom:
    put:
      tags:
      - bom
      summary: Upload a supported bill of material format document
      description: |-
        <p>
          Expects CycloneDX and a valid project UUID. If a UUID is not specified,
          then the <code>projectName</code> and <code>projectVersion</code> must be specified.
          Optionally, if <code>autoCreate</code> is specified and <code>true</code> and the project does not exist,
          the project will be created. In this scenario, the principal making the request will
          additionally need the <strong>PORTFOLIO_MANAGEMENT</strong>, <strong>PORTFOLIO_MANAGEMENT_CREATE</strong>,
          or <strong>PROJECT_CREATION_UPLOAD</strong> permission.
        </p>
        <p>
          The BOM will be validated against the CycloneDX schema. If schema validation fails,
          a response with problem details in RFC 9457 format will be returned. In this case,
          the response's content type will be <code>application/problem+json</code>.
        </p>
        <p>
          The maximum allowed length of the <code>bom</code> value is 20'000'000 characters.
          When uploading large BOMs, the <code>POST</code> endpoint is preferred,
          as it does not have this limit.
        </p>
        <p>Requires permission <strong>BOM_UPLOAD</strong></p>
      operationId: UploadBomBase64Encoded
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BomSubmitRequest"
        required: true
      responses:
        "200":
          description: Token to be used for checking BOM processing progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomUploadResponse"
        "400":
          description: The uploaded BOM is invalid
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
    post:
      tags:
      - bom
      summary: Upload a supported bill of material format document
      description: |-
        <p>
          Expects CycloneDX and a valid project UUID. If a UUID is not specified,
          then the <code>projectName</code> and <code>projectVersion</code> must be specified.
          Optionally, if <code>autoCreate</code> is specified and <code>true</code> and the project does not exist,
          the project will be created. In this scenario, the principal making the request will
          additionally need the <strong>PORTFOLIO_MANAGEMENT</strong>, <strong>PORTFOLIO_MANAGEMENT_CREATE</strong>,
          or <strong>PROJECT_CREATION_UPLOAD</strong> permission.
        </p>
        <p>
          MediaType supported for BOM artifact is 'application/xml', 'application/json' or 'application/x.vnd.cyclonedx+protobuf'.
          The BOM will be validated against the CycloneDX schema. If schema validation fails,
          a response with problem details in RFC 9457 format will be returned. In this case,
          the response's content type will be <code>application/problem+json</code>.
        </p>
        <p>Requires permission <strong>BOM_UPLOAD</strong></p>
      operationId: UploadBom
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                project:
                  type: string
                autoCreate:
                  type: boolean
                  default: false
                projectName:
                  type: string
                projectVersion:
                  type: string
                projectTags:
                  type: string
                parentName:
                  type: string
                parentVersion:
                  type: string
                parentUUID:
                  type: string
                isLatest:
                  type: boolean
                  default: false
                bom:
                  type: string
      responses:
        "200":
          description: Token to be used for checking BOM processing progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BomUploadResponse"
        "400":
          description: The uploaded BOM is invalid
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/calculator/cvss:
    get:
      tags:
      - calculator
      summary: "Returns the CVSS base score, impact sub-score and exploitability sub-score"
      operationId: getCvssScores
      parameters:
      - name: vector
        in: query
        description: A valid CVSSv2 or CVSSv3 vector
        required: true
        schema:
          type: string
      responses:
        "200":
          description: The calculated scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"
        "401":
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/calculator/owasp:
    get:
      tags:
      - calculator
      summary: "Returns the OWASP Risk Rating likelihood score, technical impact score\
        \ and business impact score"
      operationId: getOwaspRRScores
      parameters:
      - name: vector
        in: query
        description: A valid OWASP Risk Rating vector
        required: true
        schema:
          type: string
      responses:
        "200":
          description: The calculated scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"
        "401":
          description: Unauthorized
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/component/{uuid}/property:
    get:
      tags:
      - componentProperty
      summary: Returns a list of all properties for the specified component
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
      operationId: getProperties
      parameters:
      - name: uuid
        in: path
        description: The UUID of the component to retrieve properties for
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: A list of all properties for the specified component
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComponentProperty"
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
    put:
      tags:
      - componentProperty
      summary: Creates a new component property
      description: <p>Requires permission <strong>PORTFOLIO_MANAGEMENT</strong> or
        <strong>PORTFOLIO_MANAGEMENT_CREATE</strong></p>
      operationId: createProperty
      parameters:
      - name: uuid
        in: path
        description: The UUID of the component to create a property for
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComponentProperty"
      responses:
        "201":
          description: The created component
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentProperty"
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The component could not be found
        "409":
          description: A property with the specified component/group/name combination
            already exists
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/component/{uuid}/property/{propertyUuid}:
    delete:
      tags:
      - componentProperty
      summary: Deletes a config property
      description: <p>Requires permission <strong>PORTFOLIO_MANAGEMENT</strong> or
        <strong>PORTFOLIO_MANAGEMENT_DELETE</strong></p>
      operationId: deleteProperty
      parameters:
      - name: uuid
        in: path
        description: The UUID of the component to delete a property from
        required: true
        schema:
          type: string
          format: uuid
      - name: propertyUuid
        in: path
        description: The UUID of the component property to delete
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Property removed successfully
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The component or component property could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/component/project/{uuid}:
    get:
      tags:
      - component
      summary: Returns a list of all components for a given project
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
      operationId: getAllComponents
      parameters:
      - name: pageNumber
        in: query
        description: The page to return. To be used in conjunction with <code>pageSize</code>.
        schema:
          type: string
          default: "1"
      - name: pageSize
        in: query
        description: Number of elements to return per page. To be used in conjunction
          with <code>pageNumber</code>.
        schema:
          type: string
          default: "100"
      - name: offset
        in: query
        description: Offset to start returning elements from. To be used in conjunction
          with <code>limit</code>.
        schema:
          type: string
      - name: limit
        in: query
        description: Number of elements to return per page. To be used in conjunction
          with <code>offset</code>.
        schema:
          type: string
      - name: sortName
        in: query
        description: Name of the resource field to sort on.
        schema:
          type: string
      - name: sortOrder
        in: query
        description: Ordering of items when sorting with <code>sortName</code>.
        schema:
          type: string
          enum:
          - "asc, desc"
      - name: uuid
        in: path
        description: The UUID of the project to retrieve components for
        required: true
        schema:
          type: string
          format: uuid
      - name: onlyOutdated
        in: query
        description: Optionally exclude recent components so only outdated components
          are returned
        schema:
          type: boolean
      - name: onlyDirect
        in: query
        description: Optionally exclude transitive dependencies so only direct dependencies
          are returned
        schema:
          type: boolean
      responses:
        "200":
          description: A list of all components for a given project
          headers:
            X-Total-Count:
              description: The total number of components
              style: simple
              schema:
                format: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Component"
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
    put:
      tags:
      - component
      summary: Creates a new component
      description: <p>Requires permission <strong>PORTFOLIO_MANAGEMENT</strong> or
        <strong>PORTFOLIO_MANAGEMENT_UPDATE</strong></p>
      operationId: createComponent
      parameters:
      - name: uuid
        in: path
        description: The UUID of the project to create a component for
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Component"
      responses:
        "201":
          description: The created component
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Component"
        "401":
          description: Unauthorized
        "403":
          description: Access to the requested project is forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The project could not be found
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
  /v1/component/{uuid}:
    get:
      tags:
      - component
      summary: Returns a specific component
      description: <p>Requires permission <strong>VIEW_PORTFOLIO</strong></p>
