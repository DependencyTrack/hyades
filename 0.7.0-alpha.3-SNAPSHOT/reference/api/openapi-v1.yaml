components:
  schemas:
    About:
      type: object
      properties:
        systemUuid:
          type: string
        framework:
          $ref: "#/components/schemas/Framework"
        application:
          type: string
        uuid:
          type: string
        version:
          type: string
        timestamp:
          type: string
        providerData:
          type: object
          additionalProperties:
            type: object
    Framework:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
        version:
          type: string
        timestamp:
          type: string
    AclMappingRequest:
      required:
      - project
      - team
      type: object
      properties:
        team:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
          type: string
        project:
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
          type: string
    CelExpressionError:
      type: object
      properties:
        line:
          type: integer
          format: int32
        column:
          type: integer
          format: int32
        message:
          type: string
      description: Errors identified during CEL expression compilation
    InvalidBomProblemDetails:
      required:
      - detail
      - status
      - title
      type: object
      allOf:
      - $ref: "#/components/schemas/ProblemDetails"
      - type: object
        properties:
          errors:
            type: array
            description: Errors identified during schema validation
            items:
              type: string
              description: Errors identified during schema validation
    InvalidNotificationFilterExpressionProblemDetails:
      required:
      - detail
      - status
      - title
      type: object
      allOf:
      - $ref: "#/components/schemas/ProblemDetails"
      - type: object
        properties:
          errors:
            type: array
            description: Errors identified during CEL expression compilation
            items:
              $ref: "#/components/schemas/CelExpressionError"
    ProblemDetails:
      required:
      - detail
      - status
      - title
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type
          format: uri
          example: https://api.example.org/foo/bar/example-problem
        status:
          type: integer
          description: HTTP status code generated by the origin server for this occurrence
            of the problem
          format: int32
          example: 400
        title:
          type: string
          description: "Short, human-readable summary of the problem type"
          example: Example title
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence of the
            problem
          example: Example detail
        instance:
          type: string
          description: Reference URI that identifies the specific occurrence of the
            problem
          format: uri
          example: https://api.example.org/foo/bar/example-instance
      description: An RFC 9457 problem object
    TagOperationProblemDetails:
      required:
      - detail
      - status
      - title
      type: object
      allOf:
      - $ref: "#/components/schemas/ProblemDetails"
      - type: object
        properties:
          errors:
            type: object
            additionalProperties:
              type: string
              description: "Errors encountered during the operation, grouped by tag\
                \ name"
            description: "Errors encountered during the operation, grouped by tag\
              \ name"
    AffectedComponent:
      type: object
      properties:
        identityType:
          type: string
          enum:
          - CPE
          - PURL
        identity:
          type: string
        versionType:
          type: string
          enum:
          - EXACT
          - RANGE
        version:
          type: string
        versionEndExcluding:
          type: string
        versionEndIncluding:
          type: string
        versionStartExcluding:
          type: string
        versionStartIncluding:
          type: string
        uuid:
          type: string
          format: uuid
        affectedVersionAttributions:
          type: array
          items:
            $ref: "#/components/schemas/AffectedVersionAttribution"
    AffectedVersionAttribution:
      required:
      - firstSeen
      - lastSeen
      type: object
      properties:
        firstSeen:
          type: integer
          description: UNIX epoch timestamp in milliseconds
          format: int64
        lastSeen:
          type: integer
          description: UNIX epoch timestamp in milliseconds
          format: int64
        source:
          type: string
          enum:
          - NVD
          - NPM
          - GITHUB
          - VULNDB
          - OSSINDEX
          - RETIREJS
          - INTERNAL
          - OSV
          - SNYK
          - CSAF
        uuid:
          type: string
          format: uuid
    ApiKey:
      type: object
      properties:
        comment:
          maxLength: 255
          minLength: 0
          type: string
        created:
          type: string
          format: date-time
        lastUsed:
          type: string
          format: date-time
        publicId:
          maxLength: 8
          minLength: 5
          type: string
        legacy:
          type: boolean
        maskedKey:
          type: string
        key:
          type: string
    Component:
      required:
      - classifier
      - name
      - project
      - uuid
      type: object
      properties:
        authors:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationalContact"
        publisher:
          maxLength: 255
          minLength: 0
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]*$"
          type: string
        supplier:
          $ref: "#/components/schemas/OrganizationalEntity"
        group:
          maxLength: 255
          minLength: 0
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]*$"
          type: string
        name:
          maxLength: 255
          minLength: 1
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]*$"
          type: string
        version:
          maxLength: 255
          minLength: 0
          pattern: "^[\\p{IsWhite_Space}\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]*$"
          type: string
        classifier:
          type: string
          enum:
          - APPLICATION
          - FRAMEWORK
          - LIBRARY
          - CONTAINER
          - OPERATING_SYSTEM
          - DEVICE
          - FIRMWARE
          - FILE
          - PLATFORM
          - DEVICE_DRIVER
          - MACHINE_LEARNING_MODEL
          - DATA
        filename:
          maxLength: 255
          minLength: 0
          pattern: "^[\\p{Alnum}:/\\\\!@#$%^&{}\\[\\]()_+\\-=,.~'` ]{1,255}$"
          type: string
        extension:
          maxLength: 255
          minLength: 0
          pattern: "^[\\p{Alnum}!@#$%^&{}\\[\\]()_+\\-=,.~'` ]{1,255}$"
          type: string
        md5:
          pattern: "^[0-9a-fA-F]{32}$"
          type: string
        sha1:
          pattern: "^[0-9a-fA-F]{40}$"
          type: string
        sha256:
          pattern: "^[0-9a-fA-F]{64}$"
          type: string
        sha384:
          pattern: "^[0-9a-fA-F]{96}$"
          type: string
        sha512:
          pattern: "^[0-9a-fA-F]{128}$"
          type: string
        sha3_256:
          pattern: "^[0-9a-fA-F]{64}$"
          type: string
        sha3_384:
          pattern: "^[0-9a-fA-F]{96}$"
          type: string
        sha3_512:
          pattern: "^[0-9a-fA-F]{128}$"
          type: string
        blake2b_256:
          pattern: "^[0-9a-f]{64}$"
          type: string
        blake2b_384:
          pattern: "^[0-9a-f]{96}$"
          type: string
        blake2b_512:
          pattern: "^[0-9a-f]{128}$"
          type: string
        blake3:
          pattern: "^[A-Fa-f0-9]*$"
          type: string
        cpe:
          maxLength: 255
